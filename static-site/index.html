<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Personal Finance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Register service worker for cross-origin isolation (required for SharedArrayBuffer/DuckDB-WASM)
      // Only needed in production - dev server sets headers directly
      if ('serviceWorker' in navigator && window.location.hostname !== 'localhost') {
        const base = '/personal-finance-v2/';
        navigator.serviceWorker.register(base + 'coi-serviceworker.js', {
          scope: base
        }).then(function(registration) {
          // If this is the first load (no controller), reload to activate isolation
          if (!navigator.serviceWorker.controller) {
            window.location.reload();
          }
        }).catch(function(error) {
          console.warn('Service worker registration failed:', error);
        });
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
